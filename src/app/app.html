<app-menubar></app-menubar>
<div class="container">
  <as-split direction="horizontal" [gutterSize]="8">
    <as-split-area size="20">
      <as-split direction="vertical" [gutterSize]="8">
        <as-split-area size="44">
          <app-parts-management></app-parts-management>
        </as-split-area>
        <as-split-area size="28">
          <app-stocks-management></app-stocks-management>
        </as-split-area>
        <as-split-area size="28">
          <div class="workspace-pane">
            <p class="placeholder-panel">
            Settings
            </p>
          </div>
        </as-split-area>
      </as-split>
    </as-split-area>
    <as-split-area size="60">
      <div class="workspace-pane">
        @defer (on immediate) {
          <app-stock-viewport></app-stock-viewport>
        } @placeholder {
          <div class="placeholder-panel placeholder-panel--viewport">
            Loading 3D viewport…
          </div>
        }
      </div>
    </as-split-area>
    <as-split-area size="20">
      <as-split direction="vertical" [gutterSize]="8">
        <as-split-area size="34">
          <div class="workspace-pane">
            <p class="placeholder-panel">
            Solutions AG Grid
            </p>
          </div>
        </as-split-area>
        <as-split-area size="33">
          <div class="workspace-pane">
            <p class="placeholder-panel">
            Solutions Statistics
            </p>
          </div>
        </as-split-area>
        <as-split-area size="33">
          <div class="workspace-pane">
            <p class="placeholder-panel">
            Cuts
            </p>
          </div>
        </as-split-area>
      </as-split>
    </as-split-area>
  </as-split>
</div>
