<section class="stocks-panel">
  <header class="stocks-toolbar">
    <div class="stocks-toolbar-summary">
      <h2>Stocks</h2>
      <p>{{ stocks().length }} stock sheets loaded</p>
    </div>

    <input
      #stocksCsvInput
      type="file"
      accept=".csv,text/csv"
      class="visually-hidden"
      (change)="onImportFileSelected($event)"
      hidden="hidden"
    />
    <div ngToolbar aria-label="Stock Tools">
      <div class="group">
        <button
          ngToolbarWidget
          value="add"
          type="button"
          aria-label="Add Stock"
          class="material-symbols-outlined"
          translate="no"
          (click)="addStock()"
        >
          add
        </button>
        <button
          ngToolbarWidget
          value="export"
          type="button"
          aria-label="Download CSV"
          class="material-symbols-outlined"
          translate="no"
          (click)="exportStocks()"
        >
          Download
        </button>
        <button
          ngToolbarWidget
          value="upload"
          type="button"
          aria-label="Upload CSV"
          class="material-symbols-outlined"
          translate="no"
          (click)="openImportPicker(stocksCsvInput)"
        >
          Upload
        </button>
      </div>
    </div>
  </header>

  <ag-grid-angular
    class="stocks-grid"
    [theme]="gridTheme"
    [rowData]="stocks()"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [getRowId]="getRowId"
    [animateRows]="true"
    [stopEditingWhenCellsLoseFocus]="true"
    (gridReady)="onGridReady($event)"
    (rowClicked)="selectStock($event.data?.id ?? null)"
    (cellValueChanged)="onCellValueChanged($event)"
  />
</section>
