<section class="parts-panel">
  <header class="parts-toolbar">
    <div class="parts-toolbar-summary">
      <h2>Parts</h2>
      <p>{{ parts().length }} parts loaded</p>
    </div>

    <input
      #partsCsvInput
      type="file"
      accept=".csv,text/csv"
      class="visually-hidden"
      (change)="onImportFileSelected($event)"
      hidden="hidden"
    />
    <div ngToolbar aria-label="Part Tools">
      <div class="group">
        <button
          ngToolbarWidget
          value="add"
          type="button"
          aria-label="Add Part"
          class="material-symbols-outlined"
          translate="no"
          (click)="addPart()"
        >
          add
        </button>
        <button
          ngToolbarWidget
          value="export"
          type="button"
          aria-label="Download Csv"
          class="material-symbols-outlined"
          translate="no"
          (click)="exportParts()"
        >
          Download
        </button>
        <button
          ngToolbarWidget
          value="upload"
          type="button"
          aria-label="Uplad Csv"
          class="material-symbols-outlined"
          translate="no"
          (click)="openImportPicker(partsCsvInput)"

        >
          Upload
        </button>
      </div>
    </div>
  </header>

  <ag-grid-angular
    class="parts-grid"
    [theme]="gridTheme"
    [rowData]="parts()"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [getRowId]="getRowId"
    [animateRows]="true"
    [stopEditingWhenCellsLoseFocus]="true"
    (gridReady)="onGridReady($event)"
    (rowClicked)="selectPart($event.data?.id ?? null)"
    (cellValueChanged)="onCellValueChanged($event)"
  />

</section>
