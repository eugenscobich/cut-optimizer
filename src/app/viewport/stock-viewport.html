<section class="viewport-shell" #host>
  <canvas #canvas aria-label="Stock 3D viewport"></canvas>

  <div class="viewport-overlay">
    <div class="view-mode-toggle" role="group" aria-label="Viewport mode">
      <button
        type="button"
        class="view-mode-button"
        [class.view-mode-button--active]="viewMode() === '3d'"
        [attr.aria-pressed]="viewMode() === '3d'"
        (click)="setViewMode('3d')"
      >
        3D
      </button>
      <button
        type="button"
        class="view-mode-button"
        [class.view-mode-button--active]="viewMode() === '2d'"
        [attr.aria-pressed]="viewMode() === '2d'"
        (click)="setViewMode('2d')"
      >
        2D
      </button>
    </div>
    <div class="view-mode-toggle" role="group" aria-label="Camera projection">
      <button
        type="button"
        class="view-mode-button"
        [class.view-mode-button--active]="projectionMode() === 'perspective'"
        [attr.aria-pressed]="projectionMode() === 'perspective'"
        (click)="setProjectionMode('perspective')"
      >
        Perspective
      </button>
      <button
        type="button"
        class="view-mode-button"
        [class.view-mode-button--active]="projectionMode() === 'orthographic'"
        [attr.aria-pressed]="projectionMode() === 'orthographic'"
        (click)="setProjectionMode('orthographic')"
      >
        Ortho
      </button>
    </div>
    <p class="status-chip">{{ viewportStatus() }}</p>
    <p class="status-chip status-chip--secondary">{{ openCascadeStatus() }}</p>
    <p class="status-chip status-chip--hint">{{ interactionHint() }}</p>
  </div>

  @if (renderedStockCount() === 0) {
    <div class="empty-state">
      <strong>No enabled stock sheets</strong>
      <span>Enable a stock row or increase its quantity to preview the solid here.</span>
    </div>
  }
</section>
